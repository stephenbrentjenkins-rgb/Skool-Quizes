
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:16px 0}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
button{font-size:13px;padding:6px 14px;border-radius:6px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
button.active{background:var(--color-background-primary);border-color:var(--color-border-primary)}
.legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:50%}
</style>
<div class="wrap">
  <div class="controls">
    <button class="active" onclick="setView('both',this)">Show both</button>
    <button onclick="setView('support',this)">Support only</button>
    <button onclick="setView('resistance',this)">Resistance only</button>
  </div>
  <svg id="chart" width="100%" viewBox="0 0 680 340">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <rect x="40" y="20" width="600" height="280" rx="6" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>

    <line id="res-line" x1="40" y1="90" x2="640" y2="90" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line id="sup-line" x1="40" y1="250" x2="640" y2="250" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6 4"/>

    <polyline id="price-line" fill="none" stroke="var(--color-text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      points="55,200 95,170 130,220 165,155 200,240 240,200 275,135 310,100 330,92 355,100 375,130 410,90 430,98 455,80 480,90 510,115 540,90 570,105 610,120 635,150"/>

    <circle id="b1" cx="130" cy="250" r="5" fill="#0F6E56" opacity="0"/>
    <circle id="b2" cx="200" cy="250" r="5" fill="#0F6E56" opacity="0"/>
    <circle id="b3" cx="510" cy="250" r="5" fill="#0F6E56" opacity="0"/>

    <line id="b1v" x1="130" y1="220" x2="130" y2="248" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2" opacity="0" marker-end="url(#arr)"/>
    <line id="b2v" x1="200" y1="240" x2="200" y2="248" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 2" opacity="0" marker-end="url(#arr)"/>

    <circle id="r1" cx="310" cy="90" r="5" fill="#534AB7" opacity="0"/>
    <circle id="r2" cx="410" cy="90" r="5" fill="#534AB7" opacity="0"/>
    <circle id="r3" cx="540" cy="90" r="5" fill="#534AB7" opacity="0"/>

    <line id="r1v" x1="310" y1="100" x2="310" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="0" marker-end="url(#arr)"/>
    <line id="r2v" x1="410" y1="95" x2="410" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="0" marker-end="url(#arr)"/>
    <line id="r3v" x1="540" y1="95" x2="540" y2="92" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 2" opacity="0" marker-end="url(#arr)"/>

    <text id="res-label" class="ts" x="52" y="82" fill="#534AB7" font-size="12" font-family="var(--font-sans)" opacity="0">Resistance (ceiling) — sellers show up here</text>
    <text id="sup-label" class="ts" x="52" y="244" fill="#0F6E56" font-size="12" font-family="var(--font-sans)" opacity="0">Support (floor) — buyers show up here</text>

    <text class="ts" x="648" y="94" font-size="11" fill="#534AB7" font-family="var(--font-sans)">$65</text>
    <text class="ts" x="648" y="254" font-size="11" fill="#0F6E56" font-family="var(--font-sans)">$50</text>

    <text class="ts" x="340" y="315" text-anchor="middle" font-size="12" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">Time →</text>
    <text class="ts" x="30" y="170" text-anchor="middle" font-size="12" fill="var(--color-text-tertiary)" font-family="var(--font-sans)" transform="rotate(-90,30,170)">Price</text>
  </svg>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Resistance — ceiling ($65)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Support — floor ($50)</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--color-text-secondary)"></div>Price action</div>
  </div>
</div>

<script>
function setView(mode, btn) {
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const showSup = mode === 'both' || mode === 'support';
  const showRes = mode === 'both' || mode === 'resistance';
  const fade = (id, show) => { const el = document.getElementById(id); if(el) el.style.opacity = show ? '1' : '0'; };
  const fadeAttr = (id, show) => { const el = document.getElementById(id); if(el) el.setAttribute('opacity', show ? '1' : '0'); };

  fadeAttr('sup-line', showSup);
  fadeAttr('sup-label', showSup);
  fadeAttr('b1', showSup); fadeAttr('b2', showSup); fadeAttr('b3', showSup);
  fadeAttr('b1v', showSup); fadeAttr('b2v', showSup);

  fadeAttr('res-line', showRes);
  fadeAttr('res-label', showRes);
  fadeAttr('r1', showRes); fadeAttr('r2', showRes); fadeAttr('r3', showRes);
  fadeAttr('r1v', showRes); fadeAttr('r2v', showRes); fadeAttr('r3v', showRes);
}
setView('both', document.querySelector('button.active'));
</script>
