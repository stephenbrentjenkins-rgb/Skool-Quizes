<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Basic Market Conditions — Quiz · IOF Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c23;
    --border: #232830;
    --accent: #f0c040;
    --accent2: #3b82f6;
    --accent3: #22c55e;
    --danger: #ef4444;
    --text: #e8eaf0;
    --muted: #7a8090;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --serif: 'DM Serif Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: var(--mono); font-size: 0.8rem;
    color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase;
  }
  .progress-bar {
    flex: 1; max-width: 320px; margin: 0 2rem;
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.5s ease; width: 0%;
  }
  .header-score {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    letter-spacing: 0.1em;
  }
  .header-score span { color: var(--accent); }

  /* ── MAIN ── */
  main { max-width: 760px; margin: 0 auto; padding: 3.5rem 2rem 8rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── INTRO SCREEN ── */
  #introScreen {
    text-align: center; padding: 2rem 0 3rem;
    animation: fadeUp 0.5s ease;
  }
  .intro-tag {
    font-family: var(--mono); font-size: 0.7rem; color: var(--accent);
    letter-spacing: 0.2em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.4rem;
  }
  .intro-tag::before, .intro-tag::after { content: '—'; }
  #introScreen h1 {
    font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400; line-height: 1.2; margin-bottom: 1rem;
  }
  #introScreen h1 em { color: var(--accent); font-style: italic; }
  #introScreen p {
    color: var(--muted); font-size: 1rem;
    max-width: 480px; margin: 0 auto 2.5rem;
  }
  .intro-stats {
    display: flex; justify-content: center; gap: 2.5rem;
    margin-bottom: 2.5rem;
  }
  .intro-stat {
    text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem 1.6rem;
  }
  .intro-stat-val {
    font-family: var(--mono); font-size: 1.5rem; color: var(--accent);
    font-weight: 700; line-height: 1;
  }
  .intro-stat-lbl {
    font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.4rem;
  }
  .btn-start {
    display: inline-flex; align-items: center; gap: 0.6rem;
    background: var(--accent); color: #000;
    font-family: var(--mono); font-size: 0.82rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 1rem 2.4rem; border-radius: 8px;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .btn-start:hover { background: #f7d060; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,192,64,0.25); }

  /* ── QUIZ SCREEN ── */
  #quizScreen { display: none; }

  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 2.2rem 2rem; margin-bottom: 1.5rem;
    display: none;
  }
  .question-card.active { display: block; animation: fadeUp 0.35s ease; }

  .q-toprow {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem;
  }
  .q-num {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .q-score-pill {
    font-family: var(--mono); font-size: 0.65rem;
    padding: 0.3rem 0.7rem; border-radius: 20px;
    background: rgba(240,192,64,0.1); color: var(--accent);
    letter-spacing: 0.08em;
  }

  .q-text {
    font-size: 1.08rem; font-weight: 500;
    margin-bottom: 1.6rem; line-height: 1.55; color: var(--text);
  }

  .q-options { display: flex; flex-direction: column; gap: 0.65rem; }
  .q-option {
    display: flex; align-items: flex-start; gap: 0.85rem;
    padding: 0.95rem 1.15rem; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; transition: all 0.15s; font-size: 0.93rem; color: var(--text);
  }
  .q-option:hover:not(.disabled) { border-color: var(--accent); background: rgba(240,192,64,0.05); }
  .q-option.selected  { border-color: var(--accent); background: rgba(240,192,64,0.08); }
  .q-option.correct   { border-color: var(--accent3); background: rgba(34,197,94,0.1); color: #86efac; }
  .q-option.wrong     { border-color: var(--danger);  background: rgba(239,68,68,0.08); color: #fca5a5; }
  .q-option.disabled  { cursor: default; pointer-events: none; }
  .q-option.correct .q-letter { color: var(--accent3); }
  .q-option.wrong   .q-letter { color: var(--danger); }
  .q-option.selected .q-letter { color: var(--accent); }
  .q-letter {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    flex-shrink: 0; margin-top: 0.15rem; letter-spacing: 0.05em; min-width: 18px;
  }

  .q-feedback {
    margin-top: 1.1rem; padding: 1rem 1.2rem; border-radius: 9px;
    font-size: 0.88rem; line-height: 1.6; display: none;
  }
  .q-feedback.show { display: block; animation: fadeUp 0.2s ease; }
  .q-feedback.correct-fb { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
  .q-feedback.wrong-fb   { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
  .q-feedback-label { font-weight: 700; display: block; margin-bottom: 0.3rem; }

  .q-nav {
    display: flex; justify-content: flex-end; margin-top: 1.4rem;
  }
  .btn-next {
    background: var(--accent); color: #000;
    font-family: var(--mono); font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.78rem 1.8rem; border-radius: 7px;
    border: none; cursor: pointer; transition: all 0.2s;
    display: none; align-items: center; gap: 0.5rem;
  }
  .btn-next:hover { background: #f7d060; }
  .btn-next.show { display: inline-flex; }

  /* ── SCORE SCREEN ── */
  #scoreScreen { display: none; animation: fadeUp 0.5s ease; }

  .score-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 3rem 2.5rem; text-align: center;
  }
  .score-ring {
    width: 150px; height: 150px; margin: 0 auto 2rem;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .score-ring svg { position: absolute; inset: 0; }
  .score-ring-inner { position: relative; z-index: 1; }
  .score-ring-num {
    font-family: var(--mono); font-size: 2rem; color: var(--text);
    line-height: 1; font-weight: 700;
  }
  .score-ring-label {
    font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.12em; margin-top: 0.2rem;
  }
  .score-title {
    font-family: var(--serif); font-size: 2rem; font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .score-sub { color: var(--muted); margin-bottom: 2.5rem; max-width: 440px; margin-left: auto; margin-right: auto; }
  .score-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;
    margin: 0 auto 2.5rem; max-width: 400px;
  }
  .score-stat-val { font-family: var(--mono); font-size: 1.8rem; color: var(--accent); font-weight: 700; }
  .score-stat-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

  .score-review {
    margin-top: 2.5rem; text-align: left;
    border-top: 1px solid var(--border); padding-top: 2rem;
  }
  .review-heading {
    font-family: var(--mono); font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1rem;
  }
  .review-item {
    display: flex; align-items: flex-start; gap: 0.8rem;
    padding: 0.9rem 0; border-bottom: 1px solid rgba(35,40,48,0.6);
    font-size: 0.88rem;
  }
  .review-item:last-child { border-bottom: none; }
  .review-icon { flex-shrink: 0; margin-top: 0.1rem; font-size: 1rem; }
  .review-q { color: var(--text); flex: 1; line-height: 1.5; }
  .review-q span { display: block; font-size: 0.8rem; margin-top: 0.2rem; }
  .review-q span.correct-ans { color: var(--accent3); }
  .review-q span.wrong-ans   { color: #fca5a5; }

  .score-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 0; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #000;
    font-family: var(--mono); font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.85rem 2rem; border-radius: 6px;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { background: #f7d060; transform: translateY(-1px); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: transparent; color: var(--text);
    font-family: var(--mono); font-size: 0.78rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.85rem 2rem; border-radius: 6px;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── PASS BANNER ── */
  .pass-banner {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 20px;
    margin-bottom: 1rem;
  }
  .pass-banner.pass { background: rgba(34,197,94,0.12); color: var(--accent3); border: 1px solid rgba(34,197,94,0.25); }
  .pass-banner.fail { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

  @media (max-width: 560px) {
    .intro-stats { flex-direction: column; align-items: center; gap: 1rem; }
    .score-grid { grid-template-columns: 1fr; max-width: 200px; }
    header .progress-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ IOF Academy</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="header-score" id="headerScore">0 / 10</div>
</header>

<main>

  <!-- ── INTRO ── -->
  <div id="introScreen">
    <div class="intro-tag">Knowledge Check</div>
    <h1>Basic <em>Market Conditions</em></h1>
    <p>Test your understanding of market structure, institutional bias, and how IOF traders read each condition to align with Smart Money.</p>
    <div class="intro-stats">
      <div class="intro-stat">
        <div class="intro-stat-val">10</div>
        <div class="intro-stat-lbl">Questions</div>
      </div>
      <div class="intro-stat">
        <div class="intro-stat-val">80%</div>
        <div class="intro-stat-lbl">Pass Mark</div>
      </div>
      <div class="intro-stat">
        <div class="intro-stat-val">~5</div>
        <div class="intro-stat-lbl">Minutes</div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">▶ &nbsp;Begin Quiz</button>
  </div>

  <!-- ── QUIZ ── -->
  <div id="quizScreen">
    <div id="questionsContainer"></div>
  </div>

  <!-- ── SCORE ── -->
  <div id="scoreScreen">
    <div class="score-wrap">
      <div class="score-ring" id="scoreRing">
        <svg id="scoreSvg" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="68" fill="none" stroke="#232830" stroke-width="10"/>
          <circle id="scoreArc" cx="80" cy="80" r="68" fill="none" stroke="#f0c040" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="0 427" stroke-dashoffset="107"
            style="transition: stroke-dasharray 1.1s cubic-bezier(.4,0,.2,1);"/>
        </svg>
        <div class="score-ring-inner">
          <div class="score-ring-num" id="scoreNum">0%</div>
          <div class="score-ring-label">SCORE</div>
        </div>
      </div>

      <div class="pass-banner" id="passBanner">—</div>
      <div class="score-title" id="scoreTitle">—</div>
      <div class="score-sub" id="scoreSub">—</div>

      <div class="score-grid">
        <div>
          <div class="score-stat-val" id="statCorrect">0</div>
          <div class="score-stat-lbl">Correct</div>
        </div>
        <div>
          <div class="score-stat-val" id="statWrong">0</div>
          <div class="score-stat-lbl">Incorrect</div>
        </div>
        <div>
          <div class="score-stat-val" id="statPct">0%</div>
          <div class="score-stat-lbl">Final Score</div>
        </div>
      </div>

      <div class="score-actions">
        <button class="btn-primary" onclick="retake()">↺ &nbsp;Retake Quiz</button>
        <button class="btn-secondary" onclick="toggleReview()">Review Answers</button>
      </div>

      <div class="score-review" id="reviewPanel" style="display:none;"></div>
    </div>
  </div>

</main>

<script>
const QUESTIONS = [
  {
    q: "Which combination correctly defines a bullish market structure?",
    opts: [
      "Lower Highs and Lower Lows",
      "Higher Highs and Higher Lows",
      "Equal Highs and Equal Lows",
      "Higher Highs and Lower Lows"
    ],
    ans: 1,
    fb: "A bullish market structure is defined by Higher Highs (HH) and Higher Lows (HL). Each successive swing high is above the previous, and each successive swing low is also above the previous. This confirms upward institutional momentum."
  },
  {
    q: "In IOF analysis, what do the Higher Lows in a bullish trend actually represent?",
    opts: [
      "Random price noise between moves",
      "Points where retail traders exit at a loss",
      "Zones where institutions re-accumulate long positions after engineered stop hunts",
      "Support levels created by moving averages"
    ],
    ans: 2,
    fb: "Each Higher Low is the end of an engineered pullback — institutions drive price down into their own Order Blocks to collect sell-side liquidity and add to long positions at discounted prices before pushing to the next Higher High."
  },
  {
    q: "A ranging / consolidating market corresponds to which phase of the AMD institutional cycle?",
    opts: [
      "Manipulation",
      "Distribution",
      "Accumulation",
      "Expansion"
    ],
    ans: 2,
    fb: "A consolidation range is the Accumulation phase in its purest form. Institutions cannot place large orders at a single price without moving the market against themselves, so they quietly absorb orders across a sideways range before launching the directional move."
  },
  {
    q: "When price sweeps BELOW a consolidation range low and then rapidly reclaims that level, what does this represent?",
    opts: [
      "A confirmed bearish breakout — sell immediately",
      "A failed breakdown — the range will continue",
      "The Manipulation phase — a stop hunt before a potential bullish breakout",
      "A Break of Structure to the downside"
    ],
    ans: 2,
    fb: "This is the classic IOF Manipulation sequence before a bullish breakout: institutions sweep below the range low to trigger retail sell-stops and collect that liquidity, then reclaim the range as price prepares to break to the upside. This is NOT a sell signal — it is a setup forming."
  },
  {
    q: "If the monthly and daily timeframes are both bullish, but the H1 is currently bearish, what should your action be?",
    opts: [
      "Short the H1 bearish trend — it is the most recent information",
      "Wait — do not trade while timeframes conflict",
      "The H1 bearish move is a manipulation pullback; watch for a bullish ChoCH on H1 as your long entry signal",
      "Switch to a different asset"
    ],
    ans: 2,
    fb: "Higher timeframes always control lower timeframes. The H1 bearish move is the Manipulation / pullback phase of the larger bullish trend. Your job is to wait for the H1 to print a Change of Character (ChoCH) back to bullish from within a Bullish Order Block or FVG — that is your entry trigger."
  },
  {
    q: "What is a 'Change of Character' (ChoCH) in the context of market condition transitions?",
    opts: [
      "A massive volume spike indicating institutional entry",
      "A Break of Structure in the OPPOSITE direction of the current trend, signaling a potential reversal or phase shift",
      "When price crosses a moving average in the opposite direction",
      "A candle that closes beyond the previous day's range"
    ],
    ans: 1,
    fb: "A ChoCH is a BOS that goes against the prevailing trend — in a bullish structure, a ChoCH occurs when price breaks below the most recent Higher Low. It signals that institutions may be switching sides, and is the key confirmation to look for after a manipulation sweep."
  },
  {
    q: "How many confirmed swing points do you need at minimum before calling a market bullish?",
    opts: [
      "One new swing high after a swing low",
      "At least two Higher Highs and two Higher Lows",
      "Three consecutive green candles",
      "A new 52-week high"
    ],
    ans: 1,
    fb: "Minimum structural confirmation requires at least two Higher Highs and two Higher Lows. A single new high after a low is a potential structure shift, not a confirmed trend. Trading a 'trend' from a single data point is a common and costly retail mistake."
  },
  {
    q: "In a bearish trend, what does each rally to a Lower High actually represent from an IOF perspective?",
    opts: [
      "A buying opportunity — the market is reversing",
      "Institutions accumulating long positions for a reversal",
      "The Manipulation phase — engineered to sweep buy-side liquidity before institutions re-engage their short positions",
      "A random retracement with no institutional significance"
    ],
    ans: 2,
    fb: "In a bearish trend, each bounce to a Lower High is manufactured. Institutions drive price up above obvious resistance levels to trigger buy-stop orders and sweep buy-side liquidity, providing the volume they need to sell into. The LH is where supply zones (Bearish Order Blocks, Bearish FVGs) offer short entry opportunities."
  },
  {
    q: "What is the most dangerous mistake a retail trader makes when reading a range-bound market?",
    opts: [
      "Waiting too long to enter",
      "Using too many indicators",
      "Buying the range high as a 'breakout' or shorting the range low as a 'breakdown' — before the manipulation sweep is confirmed",
      "Not setting a stop-loss"
    ],
    ans: 2,
    fb: "The most common trap in a range is reacting to false breakouts. Institutions will deliberately push price above range highs and below range lows to trigger stops — the actual directional move comes AFTER this sweep. Entering on the first break of range almost always means becoming exit liquidity for the institution."
  },
  {
    q: "When transitioning from a bullish trend to a bearish trend, what is the correct sequence of structural events to confirm the reversal?",
    opts: [
      "Price prints a new All-Time High, then immediately reverses",
      "Three consecutive lower closes on the daily chart",
      "Price fails to make a new HH (forms a LH), then breaks below the most recent HL (ChoCH), then retests the Breaker Block before continuing lower",
      "A volume spike followed by a long red candle"
    ],
    ans: 2,
    fb: "A proper IOF-confirmed reversal requires: (1) failure to make a new Higher High — a Lower High forms instead, (2) a Break of Structure below the most recent Higher Low — this is the ChoCH, (3) price retracing to the Breaker Block (former Bullish OB that has now flipped), and (4) continuation lower from that zone. This sequence confirms institutional switching from buy-side to sell-side."
  }
];

const LETTERS = ['A', 'B', 'C', 'D'];
let currentQ = 0;
let score = 0;
let answered = new Array(QUESTIONS.length).fill(null); // null = unanswered, true/false = result
let userAnswers = new Array(QUESTIONS.length).fill(null);

function startQuiz() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestions();
  showQuestion(0);
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = QUESTIONS.map((q, i) => `
    <div class="question-card" id="qcard_${i}">
      <div class="q-toprow">
        <div class="q-num">Question ${i + 1} of ${QUESTIONS.length}</div>
        <div class="q-score-pill" id="pill_${i}">Score: 0 / ${QUESTIONS.length}</div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.opts.map((o, j) => `
          <div class="q-option" id="opt_${i}_${j}" onclick="selectAnswer(${i}, ${j})">
            <span class="q-letter">${LETTERS[j]}.</span>
            <span>${o}</span>
          </div>`).join('')}
      </div>
      <div class="q-feedback" id="fb_${i}">
        <span class="q-feedback-label" id="fblabel_${i}"></span>
        <span id="fbtext_${i}"></span>
      </div>
      <div class="q-nav">
        <button class="btn-next" id="next_${i}" onclick="advance(${i})">
          ${i < QUESTIONS.length - 1 ? 'Next Question →' : 'See Results'}
        </button>
      </div>
    </div>`).join('');
}

function showQuestion(idx) {
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`qcard_${idx}`);
  if (card) card.classList.add('active');
  updateProgress(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx] !== null) return;

  const q = QUESTIONS[qIdx];
  const isCorrect = optIdx === q.ans;
  answered[qIdx] = isCorrect;
  userAnswers[qIdx] = optIdx;
  if (isCorrect) score++;

  // Style options
  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`opt_${qIdx}_${j}`);
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('correct');
    else if (j === optIdx) el.classList.add('wrong');
  }

  // Feedback
  const fb = document.getElementById(`fb_${qIdx}`);
  const fblabel = document.getElementById(`fblabel_${qIdx}`);
  const fbtext = document.getElementById(`fbtext_${qIdx}`);
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'wrong-fb');
  fblabel.textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
  fbtext.textContent = q.fb;

  // Update score pills on all cards
  document.querySelectorAll('[id^="pill_"]').forEach(p => {
    p.textContent = `Score: ${score} / ${QUESTIONS.length}`;
  });

  // Show next button
  document.getElementById(`next_${qIdx}`).classList.add('show');

  updateProgress(qIdx);
}

function advance(qIdx) {
  if (qIdx < QUESTIONS.length - 1) {
    currentQ = qIdx + 1;
    showQuestion(currentQ);
  } else {
    showScore();
  }
}

function updateProgress(qIdx) {
  const pct = ((qIdx + (answered[qIdx] !== null ? 1 : 0)) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('headerScore').innerHTML = `Score: <span>${score} / ${QUESTIONS.length}</span>`;
}

function showScore() {
  document.getElementById('quizScreen').style.display = 'none';
  const scoreScreen = document.getElementById('scoreScreen');
  scoreScreen.style.display = 'block';
  scoreScreen.style.animation = 'none';
  void scoreScreen.offsetWidth;
  scoreScreen.style.animation = 'fadeUp 0.5s ease';

  const pct = Math.round((score / QUESTIONS.length) * 100);
  const passed = pct >= 80;

  // Ring animation
  const circumference = 2 * Math.PI * 68;
  const arc = document.getElementById('scoreArc');
  const ringColor = passed ? '#22c55e' : pct >= 60 ? '#f0c040' : '#ef4444';
  arc.style.stroke = ringColor;
  setTimeout(() => {
    arc.style.strokeDasharray = `${(pct / 100) * circumference} ${circumference}`;
  }, 100);

  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = QUESTIONS.length - score;
  document.getElementById('statPct').textContent = pct + '%';

  const banner = document.getElementById('passBanner');
  banner.textContent = passed ? '✓ Passed' : '✗ Not Passed';
  banner.className = 'pass-banner ' + (passed ? 'pass' : 'fail');

  document.getElementById('scoreTitle').textContent = passed ? 'Lesson Passed' : 'Keep Studying';
  document.getElementById('scoreSub').textContent = passed
    ? 'You have a solid foundation in reading market conditions through an IOF lens. You understand how institutions engineer each phase and how structure reveals their intent.'
    : 'Review the lesson carefully — focus on market condition transitions, the role of manipulation sweeps, and timeframe alignment rules. These are the concepts most likely to protect your capital.';

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('headerScore').innerHTML = `Score: <span>${score} / ${QUESTIONS.length}</span>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let reviewVisible = false;
function toggleReview() {
  const panel = document.getElementById('reviewPanel');
  reviewVisible = !reviewVisible;
  if (reviewVisible) {
    panel.style.display = 'block';
    panel.innerHTML = `
      <div class="review-heading">Answer Review</div>
      ${QUESTIONS.map((q, i) => {
        const correct = answered[i];
        const userAns = userAnswers[i];
        return `
          <div class="review-item">
            <div class="review-icon">${correct ? '✅' : '❌'}</div>
            <div class="review-q">
              <strong>Q${i+1}:</strong> ${q.q}
              ${!correct ? `<span class="wrong-ans">Your answer: ${LETTERS[userAns]}. ${q.opts[userAns]}</span>` : ''}
              <span class="correct-ans">Correct: ${LETTERS[q.ans]}. ${q.opts[q.ans]}</span>
            </div>
          </div>`;
      }).join('')}`;
    document.querySelector('.btn-secondary').textContent = 'Hide Review';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    panel.style.display = 'none';
    document.querySelector('.btn-secondary').textContent = 'Review Answers';
  }
}

function retake() {
  currentQ = 0;
  score = 0;
  answered.fill(null);
  userAnswers.fill(null);
  reviewVisible = false;
  document.getElementById('reviewPanel').style.display = 'none';
  document.getElementById('scoreScreen').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('headerScore').innerHTML = '0 / 10';
  // Reset arc
  document.getElementById('scoreArc').style.strokeDasharray = '0 427';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestions();
  showQuestion(0);
}
</script>
</body>
</html>
